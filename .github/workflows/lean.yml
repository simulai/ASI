name: Lean4 Verification

on:
  push:
    branches: [main]
    paths:
      - '02_theory/lean4_src/**/*.lean'
      - '02_theory/lean4_src/lakefile.lean'
  pull_request:
    paths:
      - '02_theory/lean4_src/**/*.lean'
      - '02_theory/lean4_src/lakefile.lean'
  workflow_dispatch: {}

jobs:
  lean:
    name: Lean4 Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Lean toolchain
        run: |
          set -e
          # Install elan (Lean toolchain manager) if not present
          if ! command -v elan &>/dev/null; then
            sudo apt-get update -qq
            sudo apt-get install -y elan 2>/dev/null || true
          fi

          # Install Lean 4.27.0 toolchain via elan
          elan show leanprover/lean4:v4.27.0 2>/dev/null || \
            elan toolchain install leanprover/lean4:v4.27.0

          # Add elan bin to PATH
          export PATH="$HOME/.elan/bin:$PATH"

          elan default leanprover/lean4:v4.27.0
          lake --version

      - name: Build Lean packages
        run: |
          cd 02_theory/lean4_src
          lake exe cache get 2>/dev/null || true
          lake build

      - name: Run Lean type check
        run: |
          cd 02_theory/lean4_src
          # Type check all .lean files
          for f in *.lean; do
            echo "=== Checking $f ==="
            elan run leanprover/lean4:v4.27.0 -- lean --make "$f" 2>&1 | tail -5 || true
          done
