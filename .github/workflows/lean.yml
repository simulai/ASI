name: Lean4 Verification

on:
  push:
    branches: [main]
    paths:
      - '02_theory/lean4_src/**/*.lean'
      - '02_theory/lean4_src/lakefile.lean'
  pull_request:
    paths:
      - '02_theory/lean4_src/**/*.lean'
      - '02_theory/lean4_src/lakefile.lean'

jobs:
  lean:
    name: Lean4 Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install Lean + Mathlib
        uses: leanprover/setup-lean@v4
        with:
          lean-version: 4.27.0
          mathlib: reuse

      - name: Build Lean packages
        run: |
          cd 02_theory/lean4_src
          lake build
