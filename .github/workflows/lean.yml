name: Lean4 Verification

on:
  push:
    branches: [main]
    paths:
      - '02_theory/lean4_src/**/*.lean'
      - '02_theory/lean4_src/lakefile.lean'
  pull_request:
    paths:
      - '02_theory/lean4_src/**/*.lean'
      - '02_theory/lean4_src/lakefile.lean'
  workflow_dispatch: {}

jobs:
  lean:
    name: Lean4 Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Lean
        run: |
          curl -fsSL https://elan-rs.github.io/elan/elan-rs-init.sh -o /tmp/elan-init.sh
          bash /tmp/elan-init.sh -y --default-toolchain 4.27.0
          echo "$HOME/.elan/bin" >> $GITHUB_PATH
          elan --version

      - name: Build Lean packages
        run: |
          cd 02_theory/lean4_src
          elan run 4.27.0 -- lake build
