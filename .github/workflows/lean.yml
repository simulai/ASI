name: Lean4 Verification

on:
  push:
    branches: [main]
    paths:
      - '02_theory/lean4_src/**/*.lean'
      - '02_theory/lean4_src/lakefile.lean'
  pull_request:
    paths:
      - '02_theory/lean4_src/**/*.lean'
      - '02_theory/lean4_src/lakefile.lean'

jobs:
  lean:
    name: Lean4 Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Lean
        run: |
          cd 02_theory/lean4_src
          lake exe cache get
          lake build
