    zh:`<h4>SWE-bench / Devin (2024)</h4>
<p>Devin 13.86% vs GPT-4 3.97%。<br>收益来自智能体架构，不是scale。<br>→ L3瓶颈 = 架构设计。</p>
${tag('Benchmark')}` },
];

const linksRaw = [
  { s:"p1", t:"p2", label:"theory", type:"theoretical" },
  { s:"p2", t:"p3", label:"extends", type:"theoretical" },
  { s:"p1", t:"p3", label:"components", type:"theoretical" },
  { s:"fep", t:"p2", label:"core principle", type:"theoretical" },
  { s:"landauer", t:"p2", label:"core principle", type:"theoretical" },
  { s:"landauer", t:"p3", label:"gate design", type:"theoretical" },
  { s:"hopfield", t:"p2", label:"energy fn", type:"theoretical" },
  { s:"nca", t:"p2", label:"external val", type:"validation" },
  { s:"fecg", t:"p2", label:"formal proof", type:"validation" },
  { s:"h1", t:"p2", label:"H1 val", type:"validation" },
  { s:"h2", t:"p2", label:"H2 val", type:"validation" },
  { s:"h3", t:"p2", label:"H3 val", type:"validation" },
  { s:"ebaselaw", t:"landauer", label:"unified view", type:"theoretical" },
  { s:"ebaselaw", t:"fep", label:"thermo root", type:"theoretical" },
  { s:"holonomy", t:"fep", label:"topo extension", type:"theoretical" },
  { s:"holonomy", t:"hopfield", label:"topo invariant", type:"theoretical" },
  { s:"dreamer", t:"p2", label:"different path", type:"rival" },
  { s:"voyager", t:"p2", label:"different path", type:"rival" },
  { s:"moe", t:"p2", label:"different path", type:"rival" },
  { s:"fep", t:"landauer", label:"intersection", type:"theoretical" },
  { s:"fep", t:"vaebp", label:"isomorphic", type:"theoretical" },
  { s:"fep", t:"nca", label:"supports", type:"validation" },
  { s:"platonic", t:"nca", label:"cross-val", type:"validation" },
  { s:"fecg", t:"landauer", label:"isomorphic", type:"theoretical" },
  { s:"hopfield", t:"fecg", label:"formalizes", type:"validation" },
  { s:"swebench", t:"voyager", label:"data", type:"validation" },
];

const typeColor = { core:"#4fc3f7", support:"#81c784", lean:"#ce93d8", toy:"#ffca28", rival:"#ff8a65" };
const linkColor = { theoretical:"#3a5fff", validation:"#00bcd4", rival:"#ff5252" };

// ── Build nodes with current language ──
function buildNodes() {
  return nodesRaw.map(n => ({
    ...n,
    label: lang === 'en' ? n.label_en : n.label_zh,
    detail: lang === 'en' ? n.en : n.zh,
  }));
}

// ── Build links ──
const links = linksRaw;

// ── SVG setup ──
const svg = d3.select('body').append('svg').attr('width', window.innerWidth).attr('height', window.innerHeight);
const g = svg.append('g');

// Arrow marker
svg.append('defs').append('marker')
  .attr('id', 'arrowhead')
  .attr('markerWidth', 8).attr('markerHeight', 6)
  .attr('refX', 22).attr('refY', 3).attr('orient', 'auto')
  .append('polygon')
  .attr('points', '0 0, 8 3, 0 6')
  .attr('fill', 'rgba(100,120,180,0.45)');

// Zoom
const zoom = d3.zoom().scaleExtent([0.25, 3]).on('zoom', e => g.attr('transform', e.transform));
svg.call(zoom);

// ── Simulation ──
let simNodes = buildNodes();

const simulation = d3.forceSimulation(simNodes)
  .force('link', d3.forceLink(links).id(d => d.id).distance(130).strength(0.35))
  .force('charge', d3.forceManyBody().strength(-380))
  .force('center', d3.forceCenter(window.innerWidth/2, window.innerHeight/2))
  .force('collision', d3.forceCollide(42))
  .alpha(0.5).restart();

// ── Links ──
let link = g.append('g').selectAll('line').data(links).join('line')
  .attr('stroke', d => linkColor[d.type] || '#333')
  .attr('stroke-opacity', d => d.type === 'rival' ? 0.35 : 0.55)
  .attr('stroke-width', d => d.type === 'rival' ? 1 : 1.5)
  .attr('marker-end', 'url(#arrowhead)');

// ── Nodes ──
let node = g.append('g').selectAll('g').data(simNodes).join('g')
  .attr('class', 'node')
  .call(d3.drag()
    .on('start', (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
    .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
    .on('end', (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
  );

// Outer glow ring
node.append('circle')
  .attr('r', 22).attr('fill', 'none')
  .attr('stroke', d => typeColor[d.type]).attr('stroke-width', 1.5)
  .attr('stroke-opacity', 0.25).attr('stroke-dasharray', '3,3')
  .attr('class', 'ring');

// Main circle
node.append('circle')
  .attr('r', 17).attr('fill', d => typeColor[d.type])
  .attr('fill-opacity', 0.12)
  .attr('stroke', d => typeColor[d.type]).attr('stroke-width', 2)
  .style('filter', d => `drop-shadow(0 0 7px ${typeColor[d.type]}70)`);

// Label lines
node.each(function(d) {
  const lines = d.label.split('\n');
  const el = d3.select(this);
  lines.forEach((l, i) => {
    el.append('text')
      .attr('class', 'node-label')
      .attr('y', -5 + i * 13)
      .attr('font-size', d.type === 'core' ? '11px' : '9.5px')
      .attr('font-weight', d.type === 'core' ? 'bold' : 'normal')
      .attr('fill', d.type === 'core' ? '#d0e8ff' : '#a0b0c8')
      .text(l);
  });
});

// ── Tooltip ──
const tooltip = document.getElementById('tooltip');
node.on('mouseover', (e, d) => {
  tooltip.style.display = 'block';
  tooltip.innerHTML = d.detail;
  positionTooltip(e);
}).on('mousemove', positionTooltip)
  .on('mouseout', () => { tooltip.style.display = 'none'; });

function positionTooltip(e) {
  const x = e.clientX + 16;
  const y = Math.min(e.clientY - 10, window.innerHeight - 200);
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}

// ── Tick ──
simulation.on('tick', () => {
  link
    .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
    .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
  node.attr('transform', d => `translate(${Math.max(30,Math.min(window.innerWidth-30,d.x))},${Math.max(60,Math.min(window.innerHeight-30,d.y))})`);
});

// ── Stats ──
document.getElementById('node-count').textContent = simNodes.length;
document.getElementById('edge-count').textContent = links.length;

// ── Language switch ──
function applyLang() {
  document.getElementById('legend-title').textContent = t('legendTitle');
  document.getElementById('hint').textContent = t('hint');
  document.getElementById('stats').innerHTML =
    `${t('stats')}: <span id="node-count">${simNodes.length}</span> · ${t('edges')}: <span id="edge-count">${links.length}</span>`;

  // Rebuild graph with new language
  simNodes = buildNodes();
  node.data(simNodes).each(function(d) {
    d3.select(this).selectAll('text').remove();
    const lines = d.label.split('\n');
    const el = d3.select(this);
    lines.forEach((l, i) => {
      el.append('text')
        .attr('class', 'node-label')
        .attr('y', -5 + i * 13)
        .attr('font-size', d.type === 'core' ? '11px' : '9.5px')
        .attr('font-weight', d.type === 'core' ? 'bold' : 'normal')
        .attr('fill', d.type === 'core' ? '#d0e8ff' : '#a0b0c8')
        .text(l);
    });
  });
  node.on('mouseover', (e, d) => {
    tooltip.style.display = 'block';
    tooltip.innerHTML = d.detail;
    positionTooltip(e);
  });
}

document.getElementById('btn-en').onclick = function() {
  lang = 'en';
  document.getElementById('btn-en').classList.add('active');
  document.getElementById('btn-zh').classList.remove('active');
  applyLang();
};
document.getElementById('btn-zh').onclick = function() {
  lang = 'zh';
  document.getElementById('btn-zh').classList.add('active');
  document.getElementById('btn-en').classList.remove('active');
  applyLang();
};
</script>
</body>
</html>
